<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="fp_style.css">
</head>

<body>
    <div class="container">
        <h2>Change Password</h2>
        <form action="/index.html">
            <label for="passw1">New Password</label>
            <input type="text" name="password1" id="passw1" required>
            <label for="passw2">Confirm Password</label>
            <input type="text" name="password2" id="passw2" required>
            <input type="submit" name="submit" id="btn" value="Change my password">
        </form>
    </div>
</body>

</html>
